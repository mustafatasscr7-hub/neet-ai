    .header { padding: 14px 24px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: space-between; background: #0d0d0d; position: sticky; top: 0; z-index: 10; }
    .header-title { font-size: 15px; font-weight: 700; color: #fff; }
    .header-title span { color: #4f8ef7; }

    .btn-primary { background: #4f8ef7; color: white; }
    .btn-primary:hover { background: #3b7de8; }
    .btn-outline { background: transparent; border: 1px solid #2a2a2a; color: #888; }
    .btn-outline:hover { color: #ccc; border-color: #3a3a3a; }

   .container { max-width: 900px; margin: 0 auto; padding: 16px 24px; }

    /* Subject Selection */
    .page-header-row { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
    .page-icon-badge { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #4f8ef7, #7c3aed); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .page-icon-badge svg { width: 20px; height: 20px; }
    .subject-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }
    .subject-card { background: linear-gradient(180deg, #131317, #101014); border: 1px solid #1e1e1e; border-radius: 18px; padding: 36px 24px; text-align: center; cursor: pointer; transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease; position: relative; overflow: hidden; }
    .subject-card:hover { border-color: var(--color); transform: translateY(-4px); }
    .subject-card:hover .subject-arrow { opacity: 1; transform: translateX(0); }
    .subject-card:hover .subject-icon-badge { transform: scale(1.08); }
    .subject-card.active { border-color: var(--color); background: #161616; }
    .subject-icon-badge { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; background: radial-gradient(circle, var(--color)29, var(--color)08); font-size: 30px; transition: transform 0.25s ease; }
    .subject-name { font-size: 17px; font-weight: 700; color: #ececec; margin-bottom: 10px; }
    .subject-count { font-size: 12px; color: #999; display: inline-flex; align-items: center; gap: 6px; background: #1a1a1a; padding: 4px 12px; border-radius: 20px; border: 1px solid #26262e; }
    .subject-count-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color); flex-shrink: 0; }
    .subject-arrow { position: absolute; bottom: 14px; right: 18px; color: var(--color); font-size: 15px; opacity: 0; transform: translateX(-4px); transition: all 0.25s ease; }

    /* Breadcrumb */
    .breadcrumb { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; font-size: 13px; color: #555; }
    .breadcrumb-item { cursor: pointer; transition: color 0.2s; }
    .breadcrumb-item:hover { color: #4f8ef7; }
    .breadcrumb-item.active { color: #ececec; cursor: default; }
    .breadcrumb-sep { color: #333; }

    /* Class Selection */
    .class-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
    .class-card { background: #111; border: 1px solid #1e1e1e; border-radius: 16px; padding: 28px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .class-card:hover { border-color: #4f8ef750; transform: translateY(-2px); }
    .class-card.active { border-color: #4f8ef7; background: #161616; }
    .class-number { font-size: 36px; font-weight: 700; color: #4f8ef7; margin-bottom: 8px; }
    .class-label { font-size: 13px; color: #666; }

    /* Chapter List */
    .chapter-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px; }
    .chapter-item { background: linear-gradient(180deg, #131317, #101014); border: 1px solid #1e1e1e; border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: transform 0.15s ease, border-color 0.15s ease; position: relative; display: flex; flex-direction: column; align-items: flex-start; gap: 4px; min-height: 90px; }
    .chapter-item:hover { border-color: var(--color, #4f8ef7); background: #161616; transform: translateY(-2px); }
    .chapter-item:hover .subject-arrow { opacity: 1; transform: translateX(0); }
    .chapter-item.empty { opacity: 0.45; cursor: default; }
    .chapter-item.empty:hover { transform: none; border-color: #1e1e1e; background: linear-gradient(180deg, #131317, #101014); }
    .chapter-name { font-size: 13px; color: #ececec; font-weight: 600; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .chapter-count { font-size: 11px; color: #666; margin-top: auto; }
    .chapter-arrow { color: #333; font-size: 16px; }

    /* Questions */
    .question-card { background: #111; border: 1px solid #1e1e1e; border-radius: 12px; padding: 20px; margin-bottom: 12px; }
    .q-meta { font-size: 11px; color: #555; margin-bottom: 10px; display: flex; gap: 12px; }
    .q-year { color: #4f8ef7; font-weight: 600; }
    .q-text { font-size: 14px; color: #ececec; line-height: 1.7; margin-bottom: 16px; }
    /* Match List-I/List-II columns -- color inherits from .q-text's own color (incl. its
       light-mode override), only layout needs setting here. */
    .match-list-preamble { margin-bottom: 8px; }
    .match-list-cols { display: flex; gap: 16px; margin: 8px 0; flex-wrap: wrap; }
    .match-list-col { flex: 1; min-width: 140px; }
    .match-list-item { padding: 3px 0; }
    .match-list-item p { margin: 0; display: inline; }
    .match-list-trailer { margin-top: 8px; }
    .q-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .q-option { padding: 10px 14px; border-radius: 8px; font-size: 13px; background: #1a1a1a; color: #888; border: 1px solid #2a2a2a; display: flex; gap: 10px; cursor: pointer; transition: all 0.15s ease; }
    .q-option:hover { background: #222; border-color: #3a3a3a; color: #ccc; transform: translateX(2px); }

    .q-option.wrong { border-color: #ef4444; background: #ef444415; color: #ef4444; }
    .q-actions { display: flex; gap: 8px; }
    .sol-btn { background: transparent; border: 1px solid #a78bfa; color: #a78bfa; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: 'Inter', sans-serif; transition: all 0.2s; }

    .sol-div { display: none; margin-top: 12px; padding: 12px; background: #1a1a2e; border-radius: 6px; border: 1px solid #3a3a5e; color: #c4c4c4; line-height: 1.7; font-size: 13px; overflow-x: auto; word-wrap: break-word; }

    .sol-div p { margin: 0 0 8px 0; }
    .sol-div p:last-child { margin-bottom: 0; }

    .loading { text-align: center; padding: 60px; color: #555; }
    .spinner { width: 32px; height: 32px; border: 3px solid #1e1e1e; border-top-color: #4f8ef7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }

    .empty { text-align: center; padding: 60px; color: #555; font-size: 14px; }

      }

    // ---------------- Match List-I / List-II formatting ----------------
    // Detects "Match List-I with List-II" style questions and lays the two lists out as
    // side-by-side columns instead of one long wall of text. Only kicks in when parsing is
    // unambiguous (both lists found, equal item counts) -- anything less confident falls back
    // to this file's normal rendering untouched, rather than risk mangling a question.
    function findListMarkers_ML(text) {
      // These questions consistently mention "List I ... List II" TWICE: once in the intro
      // sentence, again as the literal column header right before the real items. Taking the
      // LAST "List I" and the first "List II" after it skips the intro and lands on the pair
      // that actually precedes the content. [-–—\s] covers plain hyphen plus en-dash/em-dash,
      // which PDF extraction frequently substitutes for a typeset dash.
      const re = /(list|column)\s*[-–—\s]*\b(I{1,2})\b/gi;
      let m;
      const iPositions = [], iiPositions = [];
      while ((m = re.exec(text)) !== null) {
        const roman = m[2].toUpperCase();
        const entry = { start: m.index, end: m.index + m[0].length };
        if (roman === 'I') iPositions.push(entry); else iiPositions.push(entry);
      }
      if (iPositions.length === 0 || iiPositions.length === 0) return null;
      const lastI = iPositions[iPositions.length - 1];
      const firstIIAfter = iiPositions.find(p => p.start > lastI.start);
      if (!firstIIAfter) return null;
      return { listIStart: lastI.start, listIEnd: lastI.end, listIIEnd: firstIIAfter.end };
    }

    // Single unified pass rather than "split the List-I block, then the List-II block"
    // separately -- some questions lay items out sequentially (all of List-I, then all of
    // List-II), many interleave them row by row ("(A) M Phase (I) Proteins... (B) G2 Phase
    // (II) Inactive phase..."). Finding every marker of both types in one pass and bucketing
    // by which type each one was handles both layouts without needing to know which one a
    // given question uses.
    const MATCH_LIST_ITEM_RE = /\(\s*([a-hA-H])\s*\)|\(\s*([ivxIVX]{1,4})\s*\)|(?:^|\s)([a-hA-H]|\d{1,2})\.(?=\s|$)|(?:^|\s)([ivxIVX]{1,4})\.(?=\s|$)/g;

    function findItemMarkers_ML(content) {
      const markers = [];
      let m;
      MATCH_LIST_ITEM_RE.lastIndex = 0;
      while ((m = MATCH_LIST_ITEM_RE.exec(content)) !== null) {
        const type = (m[1] !== undefined || m[3] !== undefined) ? 'A' : 'B';
        const leadingSpace = /^\s/.test(m[0]) ? 1 : 0;
        markers.push({ start: m.index + leadingSpace, type });
      }
      return markers;
    }

    // A few source questions repeat "List-II:" (sometimes with a bracketed annotation, e.g.
    // "List-II [Stage of...]:") a second time after the real header pair -- an extraction
    // duplication artifact, not real content. It doesn't match any item marker, so it silently
    // glues onto whatever the last real item happened to be without this cleanup.
    function stripTrailingListArtifact_ML(itemText) {
      return itemText.replace(/\s*[;,.]?\s*(list|column)\s*[-–—\s]*I{1,2}\s*(\[[^\]]*\])?\s*:?\s*$/i, '').trim();
    }

    function parseMatchList_ML(text) {
      const markers = findListMarkers_ML(text);
      if (!markers) return null;
      let content = text.slice(markers.listIEnd);
      // Cut off a trailing instruction sentence ("Choose the correct answer...") before item
      // splitting -- otherwise it glues onto whatever the last real item happens to be.
      const trailerMatch = content.match(/\b(choose|select|identify)\b/i);
      let trailer = '';
      if (trailerMatch) {
        trailer = content.slice(trailerMatch.index).trim();
        content = content.slice(0, trailerMatch.index);
      }
      const itemMarkers = findItemMarkers_ML(content);
      if (itemMarkers.length === 0) return null;
      const itemsI = [], itemsII = [];
      for (let i = 0; i < itemMarkers.length; i++) {
        const start = itemMarkers[i].start;
        const end = i + 1 < itemMarkers.length ? itemMarkers[i + 1].start : content.length;
        const itemText = stripTrailingListArtifact_ML(content.slice(start, end).trim());
        if (!itemText) continue;
        (itemMarkers[i].type === 'A' ? itemsI : itemsII).push(itemText);
      }
      // Equal counts required -- an imbalance means the parse is confused (a stray "(A)"/"(B)"
      // matched inside ordinary text, a source question genuinely missing an item, etc.), and a
      // mismatched pair of columns would be actively misleading rather than merely unhelpful.
      if (itemsI.length === 0 || itemsII.length === 0 || itemsI.length !== itemsII.length) return null;
      return { preamble: text.slice(0, markers.listIStart).trim(), itemsI, itemsII, trailer };
    }

    // formatFn renders one piece of text (preamble/item/trailer) using whatever this file
    // already uses for question text -- KaTeX+Markdown on some pages, plain on others -- so
    // Match-List columns look consistent with the rest of that page's own formatting.
    // Returns null (not a fallback string) when the text isn't confidently a Match-List
    // question, so callers know to run their own normal formatting instead.
    function renderMatchListHtml_ML(text, formatFn) {
      if (!text) return null;
      const parsed = parseMatchList_ML(text);
      if (!parsed) return null;
      const colHtml = items => items.map(item => `<div class="match-list-item">${formatFn(item)}</div>`).join('');
      return (parsed.preamble ? `<div class="match-list-preamble">${formatFn(parsed.preamble)}</div>` : '')
        + `<div class="match-list-cols"><div class="match-list-col">${colHtml(parsed.itemsI)}</div><div class="match-list-col">${colHtml(parsed.itemsII)}</div></div>`
        + (parsed.trailer ? `<div class="match-list-trailer">${formatFn(parsed.trailer)}</div>` : '');
    }

    function parseWithMath(text) {
      if (!text) return '';
      const matchListHtml = renderMatchListHtml_ML(text, parseWithMathInner);
      if (matchListHtml !== null) return matchListHtml;
      return parseWithMathInner(text);
    }

    function parseWithMathInner(text) {
      if (!text) return '';
      let html = text;
      html = html.replace(/\$\$([^$]+)\$\$/g, function(_, math) {
        try { return '<div style="text-align:center;margin:8px 0;">' + katex.renderToString(math.trim(), { displayMode: true, throwOnError: false }) + '</div>'; } catch(e) { return _; }
      });
      html = html.replace(/\$([^$\n]+)\$/g, function(_, math) {
        try { return katex.renderToString(math.trim(), { displayMode: false, throwOnError: false }); } catch(e) { return _; }
      });
      return DOMPurify.sanitize(marked.parse(html));
    }

    // Same boundary-safe streaming render used in chat.html: render everything up to the
    // last complete KaTeX/markdown boundary through the real pipeline, show the still-open
    // trailing fragment as escaped plain text so raw "$$"/"**" never flashes mid-stream.
    // Keep this as one throttled full-write, not a split-node caching scheme (see chat.html
    // git history for why that broke).
    function findSafeRenderBoundary(text) {
      let i = 0;
      let lastSafe = 0;
      let inDisplay = false, inInline = false, inBold = false;
      while (i < text.length) {
        if (!inInline && !inBold && text.startsWith('$$', i)) {
          inDisplay = !inDisplay;
          i += 2;
        } else if (!inDisplay && !inBold && text[i] === '$') {
          inInline = !inInline;
          i += 1;
        } else if (!inDisplay && !inInline && text.startsWith('**', i)) {
          inBold = !inBold;
          i += 2;
        } else {
          i += 1;
        }
        if (!inDisplay && !inInline && !inBold) lastSafe = i;
      }
      return lastSafe;
    }

    function escapeStreamingTail(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    function renderStreamingText(el, fullText) {
      const safeLen = findSafeRenderBoundary(fullText);
      el.innerHTML = parseWithMath(fullText.slice(0, safeLen)) + escapeStreamingTail(fullText.slice(safeLen));
    }

function handleBack() {
      if (selectedChapter) { selectedChapter = null; showClasses(selectedSubject); }
      else if (selectedSubject) { showSubjects(); }

    async function showSubjects() {

      document.getElementById('mainContent').innerHTML = `

          </div>
        </div>
        <div class="subject-grid">
          ${Object.entries(subjectConfig).map(([name, cfg]) => `
            <div class="subject-card" style="--color:${cfg.color}" onclick="showClasses('${name}')">
              <div class="subject-icon-badge">${cfg.icon}</div>
              <div class="subject-name">${subjectName(name)}</div>
              <div class="subject-count" id="count-${name}"><span class="subject-count-dot"></span>${t('pyqbank','clickToBrowse')}</div>

      const names = Object.keys(subjectConfig);

        el.innerHTML = `<span class="subject-count-dot"></span>${c ? t('pyqbank','questionsAvailable').replace('{n}', localizeNum(c)) : t('pyqbank','comingSoon')}`;

 async function showClasses(subject) {
      selectedSubject = subject;
      const cfg = subjectConfig[subject];

      document.getElementById('mainContent').innerHTML = `
        <div class="page-header-row">
          <div class="page-icon-badge" style="background:radial-gradient(circle, ${cfg.color}29, ${cfg.color}08);">
            <span style="font-size:20px;">${cfg.icon}</span>
          </div>
          <div>
            <div class="page-title" style="margin-bottom:2px;">${subjectName(subject)}</div>
            <div class="page-subtitle" style="margin-bottom:0;" id="subjectTotalCount">${t('pyqbank','loadingQuestions')}</div>
          </div>
        </div>
        <div id="classSections" style="--color:${cfg.color}"><div class="loading"><div class="spinner"></div>${t('pyqbank','loadingQuestions')}</div></div>
      `;

      // Fetch question counts from Supabase
      const [totalRes, chapterRes] = await Promise.all([
        client.from('pyq').select('*', { count: 'exact', head: true }).eq('subject', subject).eq('is_active', true),
        client.from('pyq').select('chapter, class').eq('subject', subject).eq('is_active', true).not('chapter', 'is', null)
      ]);

      const totalEl = document.getElementById('subjectTotalCount');
      if (totalEl) totalEl.textContent = t('pyqbank','questionsAvailable').replace('{n}', localizeNum(totalRes.count || 0));

      const counts = {};
      (chapterRes.data || []).forEach(q => { if (q.chapter) counts[q.chapter] = (counts[q.chapter] || 0) + 1; });

      const renderChapters = (chapters, classNum) => {
        return `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;">
          ${chapters.map((name, i) => {
            const count = counts[name] || 0;
            const clickAttr = count ? `onclick="showQuestions('${subject}', ${classNum}, '${name.replace(/'/g, "\\'")}')"` : '';
            return `
            <div class="chapter-item ${count ? '' : 'empty'}" ${clickAttr}>
              <div class="chapter-index-num">${localizeNum(i + 1)}</div>
              <div class="chapter-name">${chapterName(name)}</div>
              <div class="chapter-count">${count ? localizeNum(count) + ' ' + t('pyqbank','qsSuffix') : t('pyqbank','comingSoon')}</div>
              ${count ? '<div class="subject-arrow" style="top:12px;bottom:auto;right:14px;font-size:13px;">→</div>' : ''}
            </div>`;
          }).join('')}
        </div>`;
      };

      document.getElementById('classSections').innerHTML = `
        <div style="margin-bottom:32px;">
          <div class="class-section-heading">${t('pyqbank','classWord')} ${localizeNum(11)}</div>
          ${renderChapters(neetSyllabus[subject][11], 11)}
        </div>

        <div style="margin-bottom:32px;">
          <div class="class-section-heading">${t('pyqbank','classWord')} ${localizeNum(12)}</div>
          ${renderChapters(neetSyllabus[subject][12], 12)}
        </div>
      `;
    }
     

      
   

    // SCREEN 4 — Questions
    async function showQuestions(subject, classNum, chapter, yearFilter = null) {
      selectedChapter = chapter;
      document.getElementById('mainContent').innerHTML = `
        <div class="breadcrumb">
          <span class="breadcrumb-item" onclick="showSubjects()">${t('pyqbank','pageTitle')}</span>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-item" onclick="showClasses('${subject}')">${subjectName(subject)}</span>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-item" onclick="showClasses('${subject}')">${t('pyqbank','classWord')} ${localizeNum(classNum)}</span>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-item active">${chapterName(chapter)}</span>
        </div>
        <div class="loading"><div class="spinner"></div>${t('pyqbank','loadingQuestions')}</div>
      `;

      let query = client.from('pyq').select('*').eq('subject', subject).eq('class', classNum).eq('chapter', chapter).eq('is_active', true);
if (yearFilter) query = query.eq('year', yearFilter);
const { data, error } = await query;

      if (error || !data || data.length === 0) {
        document.getElementById('mainContent').innerHTML = `
          <div class="empty">${t('pyqbank','noQuestionsFound')}</div>
        `;
        return;
      }

      currentChapterQuestions = data;
      currentChapterAllYears = [...new Set(data.map(q => q.year).filter(Boolean))].sort((a, b) => b - a);
      currentYearFilter = '';
      currentQuestionIndex = 0;
      renderSingleQuestion(subject, classNum, chapter);
    }

    function renderSingleQuestion(subject, classNum, chapter) {
      const data = currentChapterQuestions;
      const i = currentQuestionIndex;
      const q = data[i];

     const opts = ['a','b','c','d'].map(opt => {
        if (!q['option_' + opt]) return '';
        const optImg = q['option_' + opt + '_diagram_url'] ? `<img class="q-diagram-img" src="${q['option_' + opt + '_diagram_url']}">` : '';
        return `<div class="q-option" id="opt-${opt}" onclick="selectPyqOption('${opt}', '${q.correct_answer.toLowerCase().trim()}')"><strong>${opt.toUpperCase()})</strong> ${q['option_' + opt]}${optImg}</div>`;
      }).join('');

     

     const years = currentChapterAllYears;
const chapterEscaped = chapter.replace(/'/g, "\\'");
const yearOptions = `<option value="" ${currentYearFilter === '' ? 'selected' : ''}>${t('pyqbank','allYears')}</option>` + years.map(y => `<option value="${y}" ${String(y) === String(currentYearFilter) ? 'selected' : ''}>${localizeNum(y)}</option>`).join('');

document.getElementById('mainContent').innerHTML = `
        <div class="page-title">${chapterName(chapter)}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
          <div class="page-subtitle">${t('pyqbank','questionOf').replace('{i}', localizeNum(i + 1)).replace('{n}', localizeNum(data.length))}</div>
          <select class="year-filter-select" onchange="filterByYear(this.value, '${subject}', ${classNum}, '${chapterEscaped}')">
            ${yearOptions}
          </select>
        </div>
        <div class="question-card">
          <div class="q-meta">
            <span class="q-year">${localizeNum(q.year || '')}</span>
            <span>${subjectName(q.subject) || ''}</span>
            ${q.chapter ? `<span>${chapterName(q.chapter)}</span>` : ''}
          </div>
         <div class="q-text">${q.question}</div>
${q.diagram_url ? `<img class="q-diagram-img" src="${q.diagram_url}">` : ''}
          <div class="q-options">${opts}</div>
          <div class="q-actions">
            <button class="sol-btn" onclick="toggleSolution(this, '${q.id}', ${JSON.stringify(q).replace(/"/g, '&quot;')})">${t('pyqbank','showSolution')}</button>
            <button class="sol-btn" style="border-color:#f97316;color:#f97316;" onclick="saveQuestion(${JSON.stringify(q).replace(/"/g, '&quot;')}, 'PYQ Bank')">${t('pyqbank','save')}</button>
          </div>
          <div class="sol-div" id="sol-${q.id}"></div>
          <div style="display:flex;justify-content:space-between;margin-top:20px;">
            <button class="sol-btn" ${i === 0 ? 'disabled style="opacity:0.4;"' : ''} onclick="prevQuestion('${subject}', ${classNum}, '${chapterEscaped}')">${t('pyqbank','prev')}</button>
            <button class="sol-btn" ${i === data.length - 1 ? 'disabled style="opacity:0.4;"' : ''} onclick="nextQuestion('${subject}', ${classNum}, '${chapterEscaped}')">${t('pyqbank','next')}</button>
          </div>
        </div>
      `;
    }

    function nextQuestion(subject, classNum, chapter) {
      if (currentQuestionIndex < currentChapterQuestions.length - 1) {
        currentQuestionIndex++;
        renderSingleQuestion(subject, classNum, chapter);
      }
    }

    function prevQuestion(subject, classNum, chapter) {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderSingleQuestion(subject, classNum, chapter);
      }
    }
     
    function selectPyqOption(selectedOpt, correctOpt) {
      ['a','b','c','d'].forEach(opt => {
        const el = document.getElementById('opt-' + opt);
        if (!el) return;
        el.onclick = null;
        if (opt === correctOpt) {
          el.classList.add('correct');
        } else if (opt === selectedOpt) {
          el.classList.add('wrong');
        }
      });
      if (selectedOpt !== correctOpt) {
        const q = currentChapterQuestions[currentQuestionIndex];
        autoSaveMistake(q);
      }
    }

    async function autoSaveMistake(q) {
      const { data: { session } } = await client.auth.getSession();
      if (!session) return;
      await client.from('saved_questions').upsert({
        user_id: session.user.id,
        question_id: q.id,
        question: q.question,
        option_a: q.option_a,
        option_b: q.option_b,
        option_c: q.option_c,
        option_d: q.option_d,
        correct_answer: q.correct_answer,
        subject: q.subject,
        chapter: q.chapter,
        year: q.year,
        source: 'Mistake Journal'
      }, { onConflict: 'user_id,question_id' });
    }


      

     async function filterByYear(year, subject, classNum, chapter) {
  let query = client.from('pyq').select('*').eq('subject', subject).eq('class', classNum).eq('chapter', chapter).eq('is_active', true);
  if (year) query = query.eq('year', parseInt(year));
  const { data } = await query;
  if (data && data.length > 0) {
    currentChapterQuestions = data;
    currentYearFilter = year;
    currentQuestionIndex = 0;
    renderSingleQuestion(subject, classNum, chapter);
  }
}


    async function toggleSolution(btn, id, q) {
      const solDiv = document.getElementById('sol-' + id);
      if (solDiv.style.display === 'block') {
        solDiv.style.display = 'none';
        btn.textContent = t('pyqbank','showSolution');
        return;
      }
      if (solDiv.innerHTML) {
        solDiv.style.display = 'block';
        btn.textContent = t('pyqbank','hideSolution');
        return;
      }
      btn.textContent = t('pyqbank','generatingSolution');
      btn.disabled = true;
      solDiv.style.display = 'block';
      solDiv.innerHTML = `<span class="sol-loading-text">${t('pyqbank','aiSolving')}</span>`;
      try {
        const { data: { session } } = await client.auth.getSession();
        const res = await fetch(`${API_BASE}/solve`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q.question, option_a: q.option_a, option_b: q.option_b, option_c: q.option_c, option_d: q.option_d, correct_answer: q.correct_answer, language: getLang(), user_id: session?.user?.id || '' })
        });
        if (res.status === 402) {
          const guest = !session;
          const link = guest ? './login.html' : './pricing.html';
          solDiv.innerHTML = `<span class="sol-error-text">${t('chat', guest ? 'guestLimitReachedMessage' : 'limitReachedMessage')} <a href="${link}">${t('chat', guest ? 'login' : 'upgradeToPro')}</a></span>`;
          btn.textContent = t('pyqbank','showSolution');
          btn.disabled = false;
          return;
        }
        if (!res.ok) throw new Error('solve failed');
        const correctOpt = document.getElementById('opt-' + q.correct_answer.toLowerCase().trim());
        if (correctOpt) correctOpt.classList.add('correct');
        solDiv.innerHTML = '';
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let fullText = '';
        let lastRenderTime = 0;
        const RENDER_THROTTLE_MS = 100;
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value);
          for (let ci = 0; ci < chunk.length; ci++) {
            fullText += chunk[ci];
            const now = Date.now();
            if (now - lastRenderTime >= RENDER_THROTTLE_MS) {
              renderStreamingText(solDiv, fullText);
              lastRenderTime = now;
            }
            await new Promise(r => setTimeout(r, 1));
          }
        }
        solDiv.innerHTML = parseWithMath(fullText);
        btn.textContent = t('pyqbank','hideSolution');
        btn.disabled = false;
      } catch(e) {
        solDiv.innerHTML = `<span class="sol-error-text">${t('pyqbank','failedSolution')}</span>`;
        btn.textContent = t('pyqbank','showSolution');
        btn.disabled = false;
      }
    }

    async function saveQuestion(q, source) {
      const { data: { session } } = await client.auth.getSession();
      if (!session) { alert(t('pyqbank','pleaseLoginSave')); return; }
      const { error } = await client.from('saved_questions').insert({
        user_id: session.user.id,
        question_id: q.id,
        question: q.question,
        option_a: q.option_a,
        option_b: q.option_b,
        option_c: q.option_c,
        option_d: q.option_d,
        correct_answer: q.correct_answer,
        subject: q.subject,
        chapter: q.chapter,
        year: q.year,
        source: source
      });
      if (error) { alert(t('pyqbank','failedSaveQuestion')); return; }
      alert(t('pyqbank','questionSaved'));
    }

    showSubjects();

    async function updateStreak() {
  const { data: { session } } = await client.auth.getSession();
  if (!session) return;

  const userId = session.user.id;
  const today = new Date().toISOString().split('T')[0];

  const { data: streak } = await client
    .from('user_streaks')
    .select('*')
    .eq('user_id', userId)
    .single();

  if (!streak) {
    await client.from('user_streaks').insert({
      user_id: userId,
      last_activity_date: today,
      current_streak: 1,
      longest_streak: 1
    });
    return;
  }

  if (streak.last_activity_date === today) return;

  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayStr = yesterday.toISOString().split('T')[0];

  const newStreak = streak.last_activity_date === yesterdayStr ? streak.current_streak + 1 : 1;
  const longest = Math.max(newStreak, streak.longest_streak);

  await client.from('user_streaks').update({
    last_activity_date: today,
    current_streak: newStreak,
    longest_streak: longest
  }).eq('user_id', userId);
}
