<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PYQ Bank — NEET-AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0d0d0d; color: #ececec; min-height: 100vh; }
    .header { padding: 14px 24px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: space-between; background: #0d0d0d; position: sticky; top: 0; z-index: 10; }
    .header-title { font-size: 15px; font-weight: 700; color: #fff; }
    .header-title span { color: #4f8ef7; }
    .btn { padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif; transition: all 0.2s; border: none; }
    .btn-primary { background: #4f8ef7; color: white; }
    .btn-primary:hover { background: #3b7de8; }
    .btn-outline { background: transparent; border: 1px solid #2a2a2a; color: #888; }
    .btn-outline:hover { color: #ccc; border-color: #3a3a3a; }

   .container { max-width: 900px; margin: 0 auto; padding: 16px 24px; }

    /* Subject Selection */
    .subject-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
    .subject-card { background: #111; border: 1px solid #1e1e1e; border-radius: 16px; padding: 32px 24px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .subject-card:hover { border-color: var(--color); transform: translateY(-2px); }
    .subject-card.active { border-color: var(--color); background: #161616; }
    .subject-icon { font-size: 36px; margin-bottom: 12px; }
    .subject-name { font-size: 16px; font-weight: 700; color: #ececec; margin-bottom: 4px; }
    .subject-count { font-size: 12px; color: #555; }

    /* Breadcrumb */
    .breadcrumb { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; font-size: 13px; color: #555; }
    .breadcrumb-item { cursor: pointer; transition: color 0.2s; }
    .breadcrumb-item:hover { color: #4f8ef7; }
    .breadcrumb-item.active { color: #ececec; cursor: default; }
    .breadcrumb-sep { color: #333; }

    /* Class Selection */
    .class-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
    .class-card { background: #111; border: 1px solid #1e1e1e; border-radius: 16px; padding: 28px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .class-card:hover { border-color: #4f8ef750; transform: translateY(-2px); }
    .class-card.active { border-color: #4f8ef7; background: #161616; }
    .class-number { font-size: 36px; font-weight: 700; color: #4f8ef7; margin-bottom: 8px; }
    .class-label { font-size: 13px; color: #666; }

    /* Chapter List */
    .chapter-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px; }
    .chapter-item { background: #111; border: 1px solid #1e1e1e; border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: space-between; }
    .chapter-item:hover { border-color: #4f8ef750; background: #161616; }
    .chapter-name { font-size: 14px; color: #ececec; font-weight: 500; }
    .chapter-count { font-size: 12px; color: #555; }
    .chapter-arrow { color: #333; font-size: 16px; }

    /* Questions */
    .question-card { background: #111; border: 1px solid #1e1e1e; border-radius: 12px; padding: 20px; margin-bottom: 12px; }
    .q-meta { font-size: 11px; color: #555; margin-bottom: 10px; display: flex; gap: 12px; }
    .q-year { color: #4f8ef7; font-weight: 600; }
    .q-text { font-size: 14px; color: #ececec; line-height: 1.7; margin-bottom: 16px; }
    .q-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .q-option { padding: 10px 14px; border-radius: 8px; font-size: 13px; background: #1a1a1a; color: #888; border: 1px solid #2a2a2a; display: flex; gap: 10px; cursor: pointer; transition: all 0.15s ease; }
    .q-option:hover { background: #222; border-color: #3a3a3a; color: #ccc; transform: translateX(2px); }
    .q-option.correct { background: #4ade8020; border-color: #4ade80; color: #4ade80; }
    .q-option.wrong { border-color: #ef4444; background: #ef444415; color: #ef4444; }
    .q-actions { display: flex; gap: 8px; }
    .sol-btn { background: transparent; border: 1px solid #a78bfa; color: #a78bfa; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: 'Inter', sans-serif; transition: all 0.2s; }
    .sol-btn:hover { background: #a78bfa20; }
    .sol-div { display: none; margin-top: 12px; padding: 12px; background: #1a1a2e; border-radius: 6px; border: 1px solid #3a3a5e; color: #c4c4c4; line-height: 1.7; font-size: 13px; }

    .loading { text-align: center; padding: 60px; color: #555; }
    .spinner { width: 32px; height: 32px; border: 3px solid #1e1e1e; border-top-color: #4f8ef7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 60px; color: #555; font-size: 14px; }
    .page-title { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .page-subtitle { font-size: 13px; color: #555; margin-bottom: 32px; }
  </style>
</head>
<body>

 <div class="header">
    <div style="display:flex;align-items:center;gap:16px;">
      <button onclick="handleBack()" style="background:transparent;border:none;color:#555;cursor:pointer;font-size:13px;font-family:Inter,sans-serif;padding:0;" onmouseover="this.style.color='#4f8ef7'" onmouseout="this.style.color='#555'" data-i18n="common.back">← Back</button>
      <span class="header-title">NEET<span>-AI</span> <span data-i18n="pyqbank.headerTitle">PYQ Bank</span></span>

    <div style="display:flex;gap:10px;">
      <button class="lang-toggle" onclick="toggleLang(); showSubjects();" style="background:transparent;border:1px solid #2a2a2a;color:#888;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-family:Inter,sans-serif;">हिं</button>
      <button class="btn btn-primary" onclick="window.location.href='./chat.html'" data-i18n="personalisedTest.backToNeetAiBtn">Back to NEET-AI</button>
    </div>
  </div>
  <div class="container">
    <div id="mainContent"></div>
  </div>

  <script src="./i18n.js"></script>
  <script>
    const SUPABASE_URL = 'https://hvhnfttrfouajlyhvunq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2aG5mdHRyZm91YWpseWh2dW5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NDI1NTIsImV4cCI6MjA5NDUxODU1Mn0.8RaSu5yiTpQCEUGKrFO2y6oiRXSqdBehIz933j9Z7WA';

    let selectedSubject = null;

    function parseWithMath(text) {
      if (!text) return '';
      let html = text;
      html = html.replace(/\$\$([^$]+)\$\$/g, function(_, math) {
        try { return '<div style="text-align:center;margin:8px 0;">' + katex.renderToString(math.trim(), { displayMode: true, throwOnError: false }) + '</div>'; } catch(e) { return _; }
      });
      html = html.replace(/\$([^$\n]+)\$/g, function(_, math) {
        try { return katex.renderToString(math.trim(), { displayMode: false, throwOnError: false }); } catch(e) { return _; }
      });
      return marked.parse(html);
    }
 
function handleBack() {
      if (selectedChapter) { selectedChapter = null; showClasses(selectedSubject); }
      else if (selectedSubject) { showSubjects(); }
      else { window.location.href = './chat.html'; }
    }

    // SCREEN 1 — Subject Selection
   function showSubjects() {
      selectedSubject = null; selectedClass = null; selectedChapter = null;
      document.getElementById('mainContent').innerHTML = `


        <div class="page-title">${t('pyqbank','pageTitle')}</div>
        <div class="subject-grid">
          ${Object.entries(subjectConfig).map(([name, cfg]) => `
            <div class="subject-card" style="--color:${cfg.color}" onclick="showClasses('${name}')">
              <div class="subject-icon">${cfg.icon}</div>
              <div class="subject-name">${subjectName(name)}</div>
              <div class="subject-count">${t('pyqbank','clickToBrowse')}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

 async function showClasses(subject) {
      selectedSubject = subject;

      // Fetch question counts from Supabase
      const { data } = await client.from('pyq').select('chapter, class').eq('subject', subject).not('chapter', 'is', null);
      const counts = {};
      if (data) data.forEach(q => { if (q.chapter) counts[q.chapter] = (counts[q.chapter] || 0) + 1; });

      const renderChapters = (chapters, classNum) => {
        return `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
          ${chapters.map((name, i) => `
            <div class="chapter-item" style="flex-direction:column;align-items:flex-start;gap:4px;" onclick="showQuestions('${subject}', ${classNum}, '${name.replace(/'/g, "\\'")}')">
              <div style="font-size:10px;color:#555;font-weight:600;">${localizeNum(i + 1)}</div>
              <div class="chapter-name" style="font-size:13px;">${chapterName(name)}</div>
              <div class="chapter-count">${counts[name] ? localizeNum(counts[name]) + ' ' + t('pyqbank','qsSuffix') : t('pyqbank','comingSoon')}</div>
            </div>
          `).join('')}
        </div>`;
      };

      document.getElementById('mainContent').innerHTML = `

       <div class="page-title" style="margin-bottom:24px;">${subjectName(subject)}</div>
        <div style="margin-bottom:32px;">
          <div style="font-size:13px;font-weight:700;color:#4f8ef7;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:16px;padding:8px 0;border-bottom:1px solid #1e1e1e;">${t('pyqbank','classWord')} ${localizeNum(11)}</div>
          ${renderChapters(neetSyllabus[subject][11], 11)}
        </div>

        <div style="margin-bottom:32px;">
          <div style="font-size:13px;font-weight:700;color:#4f8ef7;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:16px;padding:8px 0;border-bottom:1px solid #1e1e1e;">${t('pyqbank','classWord')} ${localizeNum(12)}</div>
          ${renderChapters(neetSyllabus[subject][12], 12)}
        </div>
      `;
    }
     

      
   

    // SCREEN 4 — Questions
    async function showQuestions(subject, classNum, chapter, yearFilter = null) {
      selectedChapter = chapter;
      document.getElementById('mainContent').innerHTML = `
        <div class="breadcrumb">
          <span class="breadcrumb-item" onclick="showSubjects()">${t('pyqbank','pageTitle')}</span>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-item" onclick="showClasses('${subject}')">${subjectName(subject)}</span>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-item" onclick="showChapters('${subject}', ${classNum})">${t('pyqbank','classWord')} ${localizeNum(classNum)}</span>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-item active">${chapterName(chapter)}</span>
        </div>
        <div class="loading"><div class="spinner"></div>${t('pyqbank','loadingQuestions')}</div>
      `;

      let query = client.from('pyq').select('*').eq('subject', subject).eq('class', classNum).eq('chapter', chapter).eq('is_active', true);
if (yearFilter) query = query.eq('year', yearFilter);
const { data, error } = await query;

      if (error || !data || data.length === 0) {
        document.getElementById('mainContent').innerHTML = `
          <div class="empty">${t('pyqbank','noQuestionsFound')}</div>
        `;
        return;
      }

      currentChapterQuestions = data;
      currentQuestionIndex = 0;
      renderSingleQuestion(subject, classNum, chapter);
    }

    function renderSingleQuestion(subject, classNum, chapter) {
      const data = currentChapterQuestions;
      const i = currentQuestionIndex;
      const q = data[i];

     const opts = ['a','b','c','d'].map(opt => {
        if (!q['option_' + opt]) return '';
        return `<div class="q-option" id="opt-${opt}" onclick="selectPyqOption('${opt}', '${q.correct_answer.toLowerCase().trim()}')"><strong>${opt.toUpperCase()})</strong> ${q['option_' + opt]}</div>`;
      }).join(''); 

     

     const years = [...new Set(currentChapterQuestions.map(q => q.year).filter(Boolean))].sort((a,b) => b-a);
const yearOptions = `<option value="">${t('pyqbank','allYears')}</option>` + years.map(y => `<option value="${y}">${localizeNum(y)}</option>`).join('');

document.getElementById('mainContent').innerHTML = `
        <div class="page-title">${chapterName(chapter)}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
          <div class="page-subtitle">${t('pyqbank','questionOf').replace('{i}', localizeNum(i + 1)).replace('{n}', localizeNum(data.length))}</div>
          <select onchange="filterByYear(this.value, '${subject}', ${classNum}, '${chapter}')" style="background:#0d0d12;border:1px solid #2a2a35;border-radius:8px;padding:6px 12px;color:#ececec;font-size:13px;font-family:Inter,sans-serif;cursor:pointer;">
            ${yearOptions}
          </select>
        </div>
        <div class="question-card">
          <div class="q-meta">
            <span class="q-year">${localizeNum(q.year || '')}</span>
            <span>${subjectName(q.subject) || ''}</span>
            ${q.chapter ? `<span>${chapterName(q.chapter)}</span>` : ''}
          </div>
         <div class="q-text">${q.question}</div>
${q.diagram_url ? `<img src="${q.diagram_url}" style="max-width:100%;border-radius:8px;margin:12px 0;border:1px solid #2a2a2a;">` : ''}
          <div class="q-options">${opts}</div>
          <div class="q-actions">
            <button class="sol-btn" onclick="toggleSolution(this, '${q.id}', ${JSON.stringify(q).replace(/"/g, '&quot;')})">${t('pyqbank','showSolution')}</button>
            <button class="sol-btn" style="border-color:#f97316;color:#f97316;" onclick="saveQuestion(${JSON.stringify(q).replace(/"/g, '&quot;')}, 'PYQ Bank')">${t('pyqbank','save')}</button>
          </div>
          <div class="sol-div" id="sol-${q.id}"></div>
          <div style="display:flex;justify-content:space-between;margin-top:20px;">
            <button class="sol-btn" ${i === 0 ? 'disabled style="opacity:0.4;"' : ''} onclick="prevQuestion('${subject}', ${classNum}, '${chapter}')">${t('pyqbank','prev')}</button>
            <button class="sol-btn" ${i === data.length - 1 ? 'disabled style="opacity:0.4;"' : ''} onclick="nextQuestion('${subject}', ${classNum}, '${chapter}')">${t('pyqbank','next')}</button>
          </div>
        </div>
      `;
    }

    function nextQuestion(subject, classNum, chapter) {
      if (currentQuestionIndex < currentChapterQuestions.length - 1) {
        currentQuestionIndex++;
        renderSingleQuestion(subject, classNum, chapter);
      }
    }

    function prevQuestion(subject, classNum, chapter) {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderSingleQuestion(subject, classNum, chapter);
      }
    }
     
    function selectPyqOption(selectedOpt, correctOpt) {
      ['a','b','c','d'].forEach(opt => {
        const el = document.getElementById('opt-' + opt);
        if (!el) return;
        el.onclick = null;
        if (opt === correctOpt) {
          el.classList.add('correct');
        } else if (opt === selectedOpt) {
          el.classList.add('wrong');
        }
      });
      if (selectedOpt !== correctOpt) {
        const q = currentChapterQuestions[currentQuestionIndex];
        autoSaveMistake(q);
      }
    }

    async function autoSaveMistake(q) {
      const { data: { session } } = await client.auth.getSession();
      if (!session) return;
      await client.from('saved_questions').upsert({
        user_id: session.user.id,
        question_id: q.id,
        question: q.question,
        option_a: q.option_a,
        option_b: q.option_b,
        option_c: q.option_c,
        option_d: q.option_d,
        correct_answer: q.correct_answer,
        subject: q.subject,
        chapter: q.chapter,
        year: q.year,
        source: 'Mistake Journal'
      }, { onConflict: 'user_id,question_id' });
    }


      

     async function filterByYear(year, subject, classNum, chapter) {
  let query = client.from('pyq').select('*').eq('subject', subject).eq('class', classNum).eq('chapter', chapter).eq('is_active', true);
  if (year) query = query.eq('year', parseInt(year));
  const { data } = await query;
  if (data && data.length > 0) {
    currentChapterQuestions = data;
    currentQuestionIndex = 0;
    renderSingleQuestion(subject, classNum, chapter);
  }
}


    async function toggleSolution(btn, id, q) {
      const solDiv = document.getElementById('sol-' + id);
      if (solDiv.style.display === 'block') {
        solDiv.style.display = 'none';
        btn.textContent = t('pyqbank','showSolution');
        return;
      }
      if (solDiv.innerHTML) {
        solDiv.style.display = 'block';
        btn.textContent = t('pyqbank','hideSolution');
        return;
      }
      btn.textContent = t('pyqbank','generatingSolution');
      btn.disabled = true;
      solDiv.style.display = 'block';
      solDiv.innerHTML = `<span style="color:#888;">${t('pyqbank','aiSolving')}</span>`;
      try {
        const res = await fetch('https://neet-ai-production.up.railway.app/solve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q.question, option_a: q.option_a, option_b: q.option_b, option_c: q.option_c, option_d: q.option_d, correct_answer: q.correct_answer, language: getLang() })
        });
        const data = await res.json();
        const correctOpt = document.getElementById('opt-' + q.correct_answer.toLowerCase().trim());
        if (correctOpt) correctOpt.classList.add('correct');
        solDiv.innerHTML = parseWithMath(data.solution);
        btn.textContent = t('pyqbank','hideSolution');
        btn.disabled = false;
      } catch(e) {
        solDiv.innerHTML = `<span style="color:#ef4444;">${t('pyqbank','failedSolution')}</span>`;
        btn.textContent = t('pyqbank','showSolution');
        btn.disabled = false;
      }
    }

    async function saveQuestion(q, source) {
      const { data: { session } } = await client.auth.getSession();
      if (!session) { alert(t('pyqbank','pleaseLoginSave')); return; }
      const { error } = await client.from('saved_questions').insert({
        user_id: session.user.id,
        question_id: q.id,
        question: q.question,
        option_a: q.option_a,
        option_b: q.option_b,
        option_c: q.option_c,
        option_d: q.option_d,
        correct_answer: q.correct_answer,
        subject: q.subject,
        chapter: q.chapter,
        year: q.year,
        source: source
      });
      if (error) { alert(t('pyqbank','failedSaveQuestion')); return; }
      alert(t('pyqbank','questionSaved'));
    }

    showSubjects();

    async function updateStreak() {
  const { data: { session } } = await client.auth.getSession();
  if (!session) return;

  const userId = session.user.id;
  const today = new Date().toISOString().split('T')[0];

  const { data: streak } = await client
    .from('user_streaks')
    .select('*')
    .eq('user_id', userId)
    .single();

  if (!streak) {
    await client.from('user_streaks').insert({
      user_id: userId,
      last_activity_date: today,
      current_streak: 1,
      longest_streak: 1
    });
    return;
  }

  if (streak.last_activity_date === today) return;

  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayStr = yesterday.toISOString().split('T')[0];

  const newStreak = streak.last_activity_date === yesterdayStr ? streak.current_streak + 1 : 1;
  const longest = Math.max(newStreak, streak.longest_streak);

  await client.from('user_streaks').update({
    last_activity_date: today,
    current_streak: newStreak,
    longest_streak: longest
  }).eq('user_id', userId);
}

  </script>
