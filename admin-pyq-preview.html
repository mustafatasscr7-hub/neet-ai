<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>PYQ Preview — NEET-AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0d0d0d; color: #ececec; min-height: 100vh; }

    /* Password gate -- same pattern as admin-dashboard.html / admin-pdf-review.html */
    #gateOverlay { position: fixed; inset: 0; background: #0d0d0d; display: flex; align-items: center; justify-content: center; z-index: 999; }
    .gate-box { background: #111; border: 1px solid #2a2a2a; border-radius: 14px; padding: 32px; width: 100%; max-width: 340px; text-align: center; }
    .gate-box h1 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .gate-box p { font-size: 12px; color: #666; margin-bottom: 20px; }
    .gate-box input { width: 100%; background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 8px; padding: 10px 14px; color: #ececec; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; margin-bottom: 12px; }
    .gate-box input:focus { border-color: #4f8ef7; }
    .gate-box button { width: 100%; background: #4f8ef7; border: none; border-radius: 8px; padding: 10px; color: white; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
    .gate-box button:hover { background: #3b7de8; }
    .gate-error { font-size: 12px; color: #ef4444; margin-top: 10px; min-height: 14px; }

    #dashboard { display: none; max-width: 900px; margin: 0 auto; padding: 24px; }
    .db-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .db-header h1 { font-size: 18px; font-weight: 700; }
    .db-header h1 span { color: #4f8ef7; }
    .db-header p { font-size: 12px; color: #666; margin-top: 2px; }
    .logout-btn { background: transparent; border: 1px solid #2a2a2a; color: #888; padding: 6px 14px; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: 'Inter', sans-serif; }
    .logout-btn:hover { color: #ccc; border-color: #3a3a3a; }

    .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; background: #111; border: 1px solid #1e1e1e; border-radius: 10px; padding: 12px; }
    .filter-bar select, .filter-bar input[type="text"] {
      background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 8px; padding: 8px 12px;
      color: #ececec; font-size: 13px; font-family: 'Inter', sans-serif; outline: none;
    }
    .filter-bar select:focus, .filter-bar input:focus { border-color: #4f8ef7; }
    .filter-bar input[type="text"] { flex: 1; min-width: 200px; }
    .filter-bar label.check-label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888; white-space: nowrap; cursor: pointer; }
    .filter-bar select:disabled, .filter-bar input:disabled { opacity: 0.4; cursor: not-allowed; }
    .result-count { font-size: 12px; color: #666; width: 100%; }
    .result-note { font-size: 11px; color: #666; width: 100%; margin-top: -4px; }

    .dup-toggle-btn { background: #1a1a1a; border: 1px solid #2a2a2a; color: #ececec; padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; white-space: nowrap; }
    .dup-toggle-btn:hover { border-color: #4f8ef7; color: #4f8ef7; }
    .dup-toggle-btn.active { background: #4f8ef7; border-color: #4f8ef7; color: white; }

    /* Question card -- copied from pyqbank.html's own styling so this is a faithful preview,
       not just a similar-looking one. */
    .question-card { background: #111; border: 1px solid #1e1e1e; border-radius: 12px; padding: 20px; margin-bottom: 12px; }
    .q-meta { font-size: 11px; color: #555; margin-bottom: 10px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .q-year { color: #4f8ef7; font-weight: 600; }
    .q-text { font-size: 14px; color: #ececec; line-height: 1.7; margin-bottom: 16px; }
    .match-list-preamble { margin-bottom: 8px; }
    .match-list-cols { display: flex; gap: 16px; margin: 8px 0; flex-wrap: wrap; }
    .match-list-col { flex: 1; min-width: 140px; }
    .match-list-item { padding: 3px 0; }
    .match-list-item p { margin: 0; display: inline; }
    .match-list-trailer { margin-top: 8px; }
    /* Assertion-Reason / Statement I-II -- each part on its own line instead of one paragraph. */
    .ar-intro { margin-bottom: 8px; }
    .ar-part { margin-bottom: 6px; }
    .ar-part p { margin: 0; display: inline; }
    .ar-trailer { margin-top: 8px; }
    .q-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .q-option { padding: 10px 14px; border-radius: 8px; font-size: 13px; background: #1a1a1a; color: #888; border: 1px solid #2a2a2a; display: flex; gap: 10px; }
    .q-option.correct { background: #4ade8020; border-color: #4ade80; color: #4ade80; }
    .q-diagram-img { max-width: 100%; border-radius: 8px; margin: 12px 0; border: 1px solid #2a2a2a; display: block; }

    /* Admin-only extras -- not part of pyqbank.html's own styling */
    .q-admin-bar { display: flex; align-items: center; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px dashed #2a2a2a; flex-wrap: wrap; }
    .q-admin-id { font-size: 10px; color: #444; font-family: monospace; }
    .q-flag { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; background: #ef444420; color: #ef4444; }
    .q-inactive-flag { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; background: #66666620; color: #888; }
    .q-delete-btn { background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: 'Inter', sans-serif; }
    .q-delete-btn:hover { background: #ef444420; }
    .q-edit-btn { background: transparent; border: 1px solid #2a2a2a; color: #888; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: 'Inter', sans-serif; margin-left: auto; }
    .q-edit-btn:hover { border-color: #4f8ef7; color: #4f8ef7; }

    /* Edit form -- shown in place of the read-only card while a question is being edited */
    .q-edit-field { margin-bottom: 10px; }
    .q-edit-field label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; }
    .q-edit-field textarea, .q-edit-field input, .q-edit-field select {
      width: 100%; background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 6px;
      padding: 8px 10px; color: #ececec; font-size: 13px; font-family: 'Inter', sans-serif; outline: none; resize: vertical;
    }
    .q-edit-field textarea { overflow: hidden; }
    .q-edit-field textarea:focus, .q-edit-field input:focus, .q-edit-field select:focus { border-color: #4f8ef7; }
    .q-edit-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .q-edit-row .q-edit-field { flex: 1; min-width: 120px; }
    .q-edit-active-check { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888; margin-bottom: 14px; cursor: pointer; }
    .q-save-btn { background: #4f8ef7; border: none; color: white; padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; margin-left: auto; }
    .q-save-btn:hover { background: #3b7de8; }

    /* Diagram upload widgets inside the edit form -- same visual pattern as admin-pdf-review.html */
    .diag-paste-zone { border: 1px dashed #333; border-radius: 6px; padding: 6px 8px; }
    .diag-paste-zone:focus { outline: none; border-color: #4f8ef7; }
    .diag-paste-hint { font-size: 10px; color: #555; margin-top: 4px; }
    .edit-diagram-status { font-size: 11px; color: #666; margin-top: 6px; }
    .edit-diagram-status.error { color: #ef4444; }
    .q-diagram-edit-slot .q-diagram-img { max-width: 200px; }

    .dup-pair { margin-bottom: 24px; border: 1px solid #1e1e1e; border-radius: 12px; padding: 14px; background: #0a0a0a; }
    .dup-pair-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .dup-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
    .dup-badge.exact { background: #ef444425; color: #ef4444; }
    .dup-badge.high { background: #f59e0b25; color: #f59e0b; }
    .dup-badge.moderate { background: #66666625; color: #999; }
    .dup-dismiss-btn { background: transparent; border: 1px solid #2a2a2a; color: #888; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: 'Inter', sans-serif; }
    .dup-dismiss-btn:hover { border-color: #4ade80; color: #4ade80; }
    .dup-delete-both-btn { background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
    .dup-delete-both-btn:hover { background: #ef444420; }
    .dup-columns { display: flex; gap: 12px; flex-wrap: wrap; }
    .dup-columns .question-card { flex: 1; min-width: 280px; margin-bottom: 0; }

    .pagination { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 16px; }
    .pagination button { background: #1a1a1a; border: 1px solid #2a2a2a; color: #ececec; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: 'Inter', sans-serif; }
    .pagination button:hover:not(:disabled) { border-color: #4f8ef7; color: #4f8ef7; }
    .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
    .pagination .page-info { font-size: 12px; color: #666; }

    .loading-text, .empty-text { text-align: center; padding: 40px; color: #555; font-size: 13px; }
  </style>
</head>
<body>

  <div id="gateOverlay">
    <div class="gate-box">
      <h1>PYQ Preview</h1>
      <p>Internal tool — enter admin password</p>
      <input type="password" id="gatePassword" placeholder="Password" autocomplete="off"/>
      <button onclick="verifyPassword()">Enter</button>
      <div class="gate-error" id="gateError"></div>
    </div>
  </div>

  <div id="dashboard">
    <div class="db-header">
      <div>
        <h1>NEET<span>-AI</span> PYQ Preview</h1>
        <p>Shows questions exactly as students see them on PYQ Bank -- for checking uploads, not editing.</p>
      </div>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>

    <div class="filter-bar">
      <select id="filterSubject" onchange="onSubjectChange()">
        <option value="">All Subjects</option>
        <option value="Biology">Biology</option>
        <option value="Physics">Physics</option>
        <option value="Chemistry">Chemistry</option>
      </select>
      <select id="filterChapter" onchange="onFilterChange()">
        <option value="">All Chapters</option>
      </select>
      <input type="text" id="filterSearch" placeholder="Search question text..." oninput="onSearchInput()"/>
      <label class="check-label"><input type="checkbox" id="filterDiagram" onchange="onFilterChange()"/> Only with uploaded diagram</label>
      <button type="button" id="dupToggleBtn" class="dup-toggle-btn" onclick="toggleDuplicatesView()">🔁 Find Duplicates (50%+)</button>
      <div class="result-count" id="resultCount"></div>
      <div class="result-note" id="resultNote"></div>
    </div>

    <div id="resultsArea"><div class="loading-text">Loading...</div></div>

    <div class="pagination" id="paginationBar">
      <button id="prevPageBtn" onclick="changePage(-1)">← Prev</button>
      <span class="page-info" id="pageInfo">Page 1</span>
      <button id="nextPageBtn" onclick="changePage(1)">Next →</button>
    </div>
  </div>

  <script>
    const API_BASE = 'https://neet-ai-production.up.railway.app';
    let adminKey = sessionStorage.getItem('admin_key') || '';
    let currentPage = 1;
    let totalRows = 0;
    let currentRows = [];
    let duplicatesMode = false;
    let duplicatePairs = [];
    let duplicateRowsMap = {};
    let editingIds = new Set();
    let editDrafts = {}; // id -> pending diagram_url / option_a-d_diagram_url while a card is being edited
    let chapterCacheBySubject = {}; // subject -> [chapter names], for the edit form's chapter datalist

    function authHeaders(extra) {
      return Object.assign({ 'X-Admin-Key': adminKey }, extra || {});
    }

    // A 404 (e.g. an endpoint that hasn't been deployed yet) comes back as FastAPI's own
    // {"detail": "Not Found"} shape, not this app's usual {"error": ...} -- without checking
    // res.ok first, that silently fell through as "no rows" instead of a visible error.
    async function describeHttpError(res) {
      try {
        const body = await res.json();
        return body.error || body.detail || `HTTP ${res.status}`;
      } catch (e) {
        return `HTTP ${res.status}`;
      }
    }

    async function verifyPassword() {
      const pw = document.getElementById('gatePassword').value;
      const errEl = document.getElementById('gateError');
      errEl.textContent = '';
      try {
        const res = await fetch(`${API_BASE}/admin/verify`, { method: 'POST', headers: authHeaders({ 'X-Admin-Key': pw }) });
        if (res.status === 200) {
          adminKey = pw;
          sessionStorage.setItem('admin_key', adminKey);
          enterDashboard();
        } else if (res.status === 429) {
          const data = await res.json().catch(() => ({}));
          errEl.textContent = data.detail || 'Too many failed attempts. Try again later.';
        } else {
          errEl.textContent = 'Wrong password.';
        }
      } catch (e) {
        errEl.textContent = 'Could not reach server.';
      }
    }

    document.getElementById('gatePassword').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') verifyPassword();
    });

    function logout() {
      sessionStorage.removeItem('admin_key');
      adminKey = '';
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('gateOverlay').style.display = 'flex';
      document.getElementById('gatePassword').value = '';
    }

    async function enterDashboard() {
      document.getElementById('gateOverlay').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadResults();
    }

    async function onSubjectChange() {
      const subject = document.getElementById('filterSubject').value;
      const chapterSel = document.getElementById('filterChapter');
      chapterSel.innerHTML = '<option value="">All Chapters</option>';
      if (subject) {
        try {
          const res = await fetch(`${API_BASE}/admin/pyq-chapters?subject=${encodeURIComponent(subject)}`, { headers: authHeaders() });
          const data = await res.json();
          (data.chapters || []).forEach(ch => {
            const opt = document.createElement('option');
            opt.value = ch;
            opt.textContent = ch;
            chapterSel.appendChild(opt);
          });
        } catch (e) {}
      }
      currentPage = 1;
      if (duplicatesMode) { renderDuplicatePairs(subject); return; }
      loadResults();
    }

    function onFilterChange() {
      currentPage = 1;
      if (duplicatesMode) { renderDuplicatePairs(document.getElementById('filterSubject').value); return; }
      loadResults();
    }

    let searchDebounce = null;
    function onSearchInput() {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(() => { currentPage = 1; loadResults(); }, 400);
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str == null ? '' : String(str);
      return div.innerHTML;
    }

    function autoResizeTextarea(el) {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function extractImageFromClipboard(event) {
      const items = event.clipboardData && event.clipboardData.items;
      if (!items) return null;
      for (const item of items) {
        if (item.type && item.type.startsWith('image/')) return item.getAsFile();
      }
      return null;
    }

    async function getChaptersForSubject(subject) {
      if (chapterCacheBySubject[subject]) return chapterCacheBySubject[subject];
      try {
        const res = await fetch(`${API_BASE}/admin/pyq-chapters?subject=${encodeURIComponent(subject)}`, { headers: authHeaders() });
        const data = await res.json();
        chapterCacheBySubject[subject] = data.chapters || [];
      } catch (e) {
        chapterCacheBySubject[subject] = [];
      }
      return chapterCacheBySubject[subject];
    }

    // ---------------- Match List-I / List-II formatting ----------------
    // Detects "Match List-I with List-II" style questions and lays the two lists out as
    // side-by-side columns instead of one long wall of text. Only kicks in when parsing is
    // unambiguous (both lists found, equal item counts) -- anything less confident falls back
    // to this file's normal rendering untouched, rather than risk mangling a question.
    function findListMarkers_ML(text) {
      // These questions consistently mention "List I ... List II" TWICE: once in the intro
      // sentence, again as the literal column header right before the real items. Taking the
      // LAST "List I" and the first "List II" after it skips the intro and lands on the pair
      // that actually precedes the content. [-–—\s] covers plain hyphen plus en-dash/em-dash,
      // which PDF extraction frequently substitutes for a typeset dash.
      const re = /(list|column)\s*[-–—\s]*\b(I{1,2})\b/gi;
      let m;
      const iPositions = [], iiPositions = [];
      while ((m = re.exec(text)) !== null) {
        const roman = m[2].toUpperCase();
        const entry = { start: m.index, end: m.index + m[0].length };
        if (roman === 'I') iPositions.push(entry); else iiPositions.push(entry);
      }
      if (iPositions.length === 0 || iiPositions.length === 0) return null;
      const lastI = iPositions[iPositions.length - 1];
      const firstIIAfter = iiPositions.find(p => p.start > lastI.start);
      if (!firstIIAfter) return null;
      return { listIStart: lastI.start, listIEnd: lastI.end, listIIEnd: firstIIAfter.end };
    }

    // Single unified pass rather than "split the List-I block, then the List-II block"
    // separately -- some questions lay items out sequentially (all of List-I, then all of
    // List-II), many interleave them row by row ("(A) M Phase (I) Proteins... (B) G2 Phase
    // (II) Inactive phase..."). Finding every marker of both types in one pass and bucketing
    // by which type each one was handles both layouts without needing to know which one a
    // given question uses.
    const MATCH_LIST_ITEM_RE = /\(\s*([a-hA-H])\s*\)|\(\s*([ivxIVX]{1,4})\s*\)|(?:^|\s)([a-hA-H]|\d{1,2})\.(?=\s|$)|(?:^|\s)([ivxIVX]{1,4})\.(?=\s|$)/g;

    function findItemMarkers_ML(content) {
      const markers = [];
      let m;
      MATCH_LIST_ITEM_RE.lastIndex = 0;
      while ((m = MATCH_LIST_ITEM_RE.exec(content)) !== null) {
        const type = (m[1] !== undefined || m[3] !== undefined) ? 'A' : 'B';
        const leadingSpace = /^\s/.test(m[0]) ? 1 : 0;
        markers.push({ start: m.index + leadingSpace, type });
      }
      return markers;
    }

    // A few source questions repeat "List-II:" (sometimes with a bracketed annotation, e.g.
    // "List-II [Stage of...]:") a second time after the real header pair -- an extraction
    // duplication artifact, not real content. It doesn't match any item marker, so it silently
    // glues onto whatever the last real item happened to be without this cleanup.
    function stripTrailingListArtifact_ML(itemText) {
      return itemText.replace(/\s*[;,.]?\s*(list|column)\s*[-–—\s]*I{1,2}\s*(\[[^\]]*\])?\s*:?\s*$/i, '').trim();
    }

    function parseMatchList_ML(text) {
      const markers = findListMarkers_ML(text);
      if (!markers) return null;
      let content = text.slice(markers.listIEnd);
      // Cut off a trailing instruction sentence ("Choose the correct answer...") before item
      // splitting -- otherwise it glues onto whatever the last real item happens to be.
      const trailerMatch = content.match(/\b(choose|select|identify)\b/i);
      let trailer = '';
      if (trailerMatch) {
        trailer = content.slice(trailerMatch.index).trim();
        content = content.slice(0, trailerMatch.index);
      }
      const itemMarkers = findItemMarkers_ML(content);
      if (itemMarkers.length === 0) return null;
      const itemsI = [], itemsII = [];
      for (let i = 0; i < itemMarkers.length; i++) {
        const start = itemMarkers[i].start;
        const end = i + 1 < itemMarkers.length ? itemMarkers[i + 1].start : content.length;
        const itemText = stripTrailingListArtifact_ML(content.slice(start, end).trim());
        if (!itemText) continue;
        (itemMarkers[i].type === 'A' ? itemsI : itemsII).push(itemText);
      }
      // Equal counts required -- an imbalance means the parse is confused (a stray "(A)"/"(B)"
      // matched inside ordinary text, a source question genuinely missing an item, etc.), and a
      // mismatched pair of columns would be actively misleading rather than merely unhelpful.
      if (itemsI.length === 0 || itemsII.length === 0 || itemsI.length !== itemsII.length) return null;
      return { preamble: text.slice(0, markers.listIStart).trim(), itemsI, itemsII, trailer };
    }

    // formatFn renders one piece of text (preamble/item/trailer) using whatever this file
    // already uses for question text -- KaTeX+Markdown on some pages, plain on others -- so
    // Match-List columns look consistent with the rest of that page's own formatting.
    // Returns null (not a fallback string) when the text isn't confidently a Match-List
    // question, so callers know to run their own normal formatting instead.
    function renderMatchListHtml_ML(text, formatFn) {
      if (!text) return null;
      const parsed = parseMatchList_ML(text);
      if (!parsed) return null;
      const colHtml = items => items.map(item => `<div class="match-list-item">${formatFn(item)}</div>`).join('');
      return (parsed.preamble ? `<div class="match-list-preamble">${formatFn(parsed.preamble)}</div>` : '')
        + `<div class="match-list-cols"><div class="match-list-col">${colHtml(parsed.itemsI)}</div><div class="match-list-col">${colHtml(parsed.itemsII)}</div></div>`
        + (parsed.trailer ? `<div class="match-list-trailer">${formatFn(parsed.trailer)}</div>` : '');
    }

    // Same math rendering as pyqbank.html -- questions/options containing $...$ KaTeX markup
    // (e.g. chemical formulas) need this to actually look right, not just show raw text.
    // ---------------- Assertion-Reason / Statement I-II formatting ----------------
    // Detects "Given below are two statements: Assertion (A): ... Reason (R): ..." (or
    // "Statement I: ... Statement II: ...") style questions and breaks them into separate
    // lines (intro, each labelled part, trailer) instead of one dense paragraph. Falls back
    // to this file's normal rendering whenever fewer than 2 distinct markers are found.
    const AR_MARKER_RE = /\b(?:assertion\s*\(?\s*[a-z]?\s*\)?|reason\s*\(?\s*[a-z]?\s*\)?|statements?\s*[-\s]*(?:[ivx]{1,3}|[a-h]|\d{1,2}))\s*:/gi;

    function findAssertionReasonParts_AR(text) {
      const markers = [];
      let m;
      AR_MARKER_RE.lastIndex = 0;
      while ((m = AR_MARKER_RE.exec(text)) !== null) {
        markers.push({ start: m.index, end: m.index + m[0].length, label: m[0] });
      }
      if (markers.length < 2) return null;

      // Same phenomenon as the Match-List parser's intro-vs-header problem: the intro
      // sentence itself often says "...the other is labelled as Reason (R):", which reads
      // identically to a real marker. A real question never labels two parts with the same
      // marker, so when one repeats, keep only its LAST occurrence (closest to the real
      // content) and drop the earlier one as an intro mention.
      const lastByKind = new Map();
      markers.forEach(mk => {
        const kind = mk.label.toLowerCase().replace(/[^a-z0-9]/g, '');
        lastByKind.set(kind, mk);
      });
      const dedupedMarkers = Array.from(lastByKind.values()).sort((a, b) => a.start - b.start);
      if (dedupedMarkers.length < 2) return null;

      const intro = text.slice(0, dedupedMarkers[0].start).trim();

      const afterLastMarker = text.slice(dedupedMarkers[dedupedMarkers.length - 1].end);
      // "In the light of the above statements," almost always precedes "choose/select/
      // identify" in the same sentence -- catching it here too keeps that whole sentence
      // together as the trailer instead of splitting it mid-clause.
      const trailerMatch = afterLastMarker.match(/\b(in the light of|choose|select|identify)\b/i);
      let trailer = '';
      let lastPartEnd = text.length;
      if (trailerMatch) {
        trailer = afterLastMarker.slice(trailerMatch.index).trim();
        lastPartEnd = dedupedMarkers[dedupedMarkers.length - 1].end + trailerMatch.index;
      }

      const parts = [];
      for (let i = 0; i < dedupedMarkers.length; i++) {
        const end = i + 1 < dedupedMarkers.length ? dedupedMarkers[i + 1].start : lastPartEnd;
        const partText = text.slice(dedupedMarkers[i].start, end).trim();
        if (partText) parts.push(partText);
      }
      if (parts.length < 2) return null;

      return { intro, parts, trailer };
    }

    function renderAssertionReasonHtml_AR(text, formatFn) {
      if (!text) return null;
      const parsed = findAssertionReasonParts_AR(text);
      if (!parsed) return null;
      const partsHtml = parsed.parts.map(p => `<div class="ar-part">${formatFn(p)}</div>`).join('');
      return (parsed.intro ? `<div class="ar-intro">${formatFn(parsed.intro)}</div>` : '')
        + partsHtml
        + (parsed.trailer ? `<div class="ar-trailer">${formatFn(parsed.trailer)}</div>` : '');
    }

    function parseWithMath(text) {
      if (!text) return '';
      const matchListHtml = renderMatchListHtml_ML(text, parseWithMathInner);
      if (matchListHtml !== null) return matchListHtml;
      const arHtml = renderAssertionReasonHtml_AR(text, parseWithMathInner);
      if (arHtml !== null) return arHtml;
      return parseWithMathInner(text);
    }

    function parseWithMathInner(text) {
      if (!text) return '';
      let html = text;
      html = html.replace(/\$\$([^$]+)\$\$/g, function(_, math) {
        try { return '<div style="text-align:center;margin:8px 0;">' + katex.renderToString(math.trim(), { displayMode: true, throwOnError: false }) + '</div>'; } catch(e) { return _; }
      });
      html = html.replace(/\$([^$\n]+)\$/g, function(_, math) {
        try { return katex.renderToString(math.trim(), { displayMode: false, throwOnError: false }); } catch(e) { return _; }
      });
      return DOMPurify.sanitize(marked.parse(html));
    }

    async function loadResults() {
      const area = document.getElementById('resultsArea');
      area.innerHTML = '<div class="loading-text">Loading...</div>';

      const params = new URLSearchParams();
      const subject = document.getElementById('filterSubject').value;
      const chapter = document.getElementById('filterChapter').value;
      const search = document.getElementById('filterSearch').value.trim();
      const onlyDiagram = document.getElementById('filterDiagram').checked;
      if (subject) params.set('subject', subject);
      if (chapter) params.set('chapter', chapter);
      if (search) params.set('search', search);
      if (onlyDiagram) params.set('with_uploaded_diagram', 'true');
      params.set('page', currentPage);
      params.set('sort_by', 'created_at');
      params.set('sort_dir', 'desc');
      params.set('full', 'true');

      try {
        const res = await fetch(`${API_BASE}/admin/pyq-search?${params.toString()}`, { headers: authHeaders() });
        if (res.status === 401) return logout();
        if (!res.ok) {
          area.innerHTML = `<div class="empty-text">Error: ${escapeHtml(await describeHttpError(res))}</div>`;
          return;
        }
        const data = await res.json();
        if (data.error) {
          area.innerHTML = `<div class="empty-text">Error: ${escapeHtml(data.error)}</div>`;
          return;
        }
        currentRows = data.rows || [];
        totalRows = data.total || 0;
        renderResults();
        renderPagination();
        document.getElementById('resultCount').textContent = `${totalRows} matching row${totalRows === 1 ? '' : 's'}`;
      } catch (e) {
        area.innerHTML = '<div class="empty-text">Could not reach server.</div>';
      }
    }

    // ---------------- Edit form: diagram upload/paste/remove ----------------
    // The same question can appear twice on screen at once in duplicates view (once per pair
    // it matches), so these never use document.getElementById -- always scoped via the actual
    // clicked/pasted-into element, otherwise a second on-screen copy of the same question would
    // silently update the wrong instance's preview.

    async function uploadImageFileForEdit(file, statusEl, onSuccess) {
      if (!file) return;
      statusEl.textContent = 'Uploading...';
      statusEl.className = 'edit-diagram-status';
      try {
        const b64 = await fileToBase64(file);
        const res = await fetch(`${API_BASE}/admin/pyq-diagram-upload`, {
          method: 'POST',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ filename: file.name || 'pasted-image.png', data: b64, media_type: file.type || 'image/png' })
        });
        if (res.status === 401) return logout();
        if (!res.ok) { statusEl.textContent = 'Upload failed: ' + await describeHttpError(res); statusEl.className = 'edit-diagram-status error'; return; }
        const data = await res.json();
        if (data.error) { statusEl.textContent = 'Upload failed: ' + data.error; statusEl.className = 'edit-diagram-status error'; return; }
        onSuccess(data.url);
      } catch (e) {
        statusEl.textContent = 'Upload failed -- check connection.';
        statusEl.className = 'edit-diagram-status error';
      }
    }

    async function uploadEditDiagram(inputEl, id, field) {
      const file = inputEl.files[0];
      if (!file) return;
      const slot = inputEl.closest('.q-diagram-edit-slot');
      const statusEl = slot.querySelector('.edit-diagram-status');
      await uploadImageFileForEdit(file, statusEl, (url) => {
        editDrafts[id][field] = url;
        rerenderCurrentView();
      });
    }

    async function handleEditDiagramPaste(event, id, field) {
      const file = extractImageFromClipboard(event);
      if (!file) return;
      event.preventDefault();
      const slot = event.currentTarget.closest('.q-diagram-edit-slot');
      const statusEl = slot.querySelector('.edit-diagram-status');
      await uploadImageFileForEdit(file, statusEl, (url) => {
        editDrafts[id][field] = url;
        rerenderCurrentView();
      });
    }

    function removeEditDiagram(id, field) {
      editDrafts[id][field] = null;
      rerenderCurrentView();
    }

    function editDiagramSlotHtml(id, field, label) {
      const url = editDrafts[id] ? editDrafts[id][field] : null;
      return `
        <div class="q-edit-field q-diagram-edit-slot">
          <label>${label}</label>
          ${url ? `
            <img class="q-diagram-img" src="${escapeHtml(url)}">
            <div><button type="button" class="q-edit-btn" onclick="removeEditDiagram('${id}', '${field}')">✕ Remove photo</button></div>
          ` : `
            <div class="diag-paste-zone" tabindex="0" onpaste="handleEditDiagramPaste(event, '${id}', '${field}')">
              <input type="file" accept="image/*" onchange="uploadEditDiagram(this, '${id}', '${field}')"/>
              <div class="diag-paste-hint">or click here and paste (Ctrl+V) an image</div>
            </div>
            <div class="edit-diagram-status"></div>
          `}
        </div>`;
    }

    // Keeps the diagram upload widgets collapsed until asked for -- matches admin-pdf-review.html's
    // "Question has diagram" / "Options have diagram" checkboxes, rather than always showing all
    // 5 upload slots even for questions that never need one. Only hides/shows; never clears
    // already-uploaded data, so an accidental uncheck can't silently lose an image on save.
    function toggleEditSlot(checkboxEl, selector) {
      const card = checkboxEl.closest('.question-card');
      const slot = card.querySelector(selector);
      if (slot) slot.style.display = checkboxEl.checked ? 'block' : 'none';
    }

    // ---------------- Edit form: the form itself ----------------

    function chapterOptionsHtml(chapters, selectedChapter) {
      return '<option value="">-- none --</option>' + chapters.map(c =>
        `<option value="${escapeHtml(c)}"${c === selectedChapter ? ' selected' : ''}>${escapeHtml(c)}</option>`
      ).join('');
    }

    async function onEditSubjectChange(selectEl) {
      const newSubject = selectEl.value;
      const card = selectEl.closest('.question-card');
      const chapterSelect = card.querySelector('[data-field="chapter"]');
      const chapters = await getChaptersForSubject(newSubject);
      // Resets to blank rather than trying to guess a match -- chapters are subject-specific,
      // so a chapter name that made sense under the old (possibly wrong) subject usually
      // won't under the new one, and silently carrying it over would just create a new
      // mistagged row instead of fixing one.
      chapterSelect.innerHTML = chapterOptionsHtml(chapters, null);
    }

    function editFormHtml(q) {
      const correctLetter = (q.correct_answer || '').toLowerCase().trim();
      const chapters = chapterCacheBySubject[q.subject] || [];
      const draft = editDrafts[q.id] || {};
      const hasStemDiagram = !!draft.diagram_url;
      const hasAnyOptionDiagram = !!(draft.option_a_diagram_url || draft.option_b_diagram_url || draft.option_c_diagram_url || draft.option_d_diagram_url);
      return `
        <div class="question-card">
          <div class="q-meta">
            <span class="q-year">${q.year || ''}</span>
            <span>${escapeHtml(q.subject || '')}</span>
            ${q.chapter ? `<span>${escapeHtml(q.chapter)}</span>` : ''}
          </div>
          <div class="q-edit-field"><label>Question</label><textarea data-field="question" rows="3" oninput="autoResizeTextarea(this)">${escapeHtml(q.question)}</textarea></div>
          <label class="q-edit-active-check"><input type="checkbox" onchange="toggleEditSlot(this, '.q-diagram-group-stem')" ${hasStemDiagram ? 'checked' : ''}/> Question has diagram</label>
          <div class="q-diagram-group-stem" style="display:${hasStemDiagram ? 'block' : 'none'}">
            ${editDiagramSlotHtml(q.id, 'diagram_url', 'Question diagram')}
          </div>
          <div class="q-edit-field"><label>Option A</label><textarea data-field="option_a" rows="1" oninput="autoResizeTextarea(this)">${escapeHtml(q.option_a || '')}</textarea></div>
          <div class="q-edit-field"><label>Option B</label><textarea data-field="option_b" rows="1" oninput="autoResizeTextarea(this)">${escapeHtml(q.option_b || '')}</textarea></div>
          <div class="q-edit-field"><label>Option C</label><textarea data-field="option_c" rows="1" oninput="autoResizeTextarea(this)">${escapeHtml(q.option_c || '')}</textarea></div>
          <div class="q-edit-field"><label>Option D</label><textarea data-field="option_d" rows="1" oninput="autoResizeTextarea(this)">${escapeHtml(q.option_d || '')}</textarea></div>
          <label class="q-edit-active-check"><input type="checkbox" onchange="toggleEditSlot(this, '.q-diagram-group-options')" ${hasAnyOptionDiagram ? 'checked' : ''}/> Options have diagram</label>
          <div class="q-diagram-group-options" style="display:${hasAnyOptionDiagram ? 'block' : 'none'}">
            ${editDiagramSlotHtml(q.id, 'option_a_diagram_url', 'Option A diagram')}
            ${editDiagramSlotHtml(q.id, 'option_b_diagram_url', 'Option B diagram')}
            ${editDiagramSlotHtml(q.id, 'option_c_diagram_url', 'Option C diagram')}
            ${editDiagramSlotHtml(q.id, 'option_d_diagram_url', 'Option D diagram')}
          </div>
          <div class="q-edit-row">
            <div class="q-edit-field">
              <label>Correct answer</label>
              <select data-field="correct_answer">
                <option value="">--</option>
                <option value="a" ${correctLetter === 'a' ? 'selected' : ''}>A</option>
                <option value="b" ${correctLetter === 'b' ? 'selected' : ''}>B</option>
                <option value="c" ${correctLetter === 'c' ? 'selected' : ''}>C</option>
                <option value="d" ${correctLetter === 'd' ? 'selected' : ''}>D</option>
              </select>
            </div>
            <div class="q-edit-field"><label>Year</label><input type="number" data-field="year" value="${q.year != null ? q.year : ''}"></div>
            <div class="q-edit-field"><label>Source tag</label><input type="text" data-field="source_tag" value="${escapeHtml(q.source_tag || '')}"></div>
          </div>
          <div class="q-edit-row">
            <div class="q-edit-field">
              <label>Subject</label>
              <select data-field="subject" onchange="onEditSubjectChange(this)">
                <option value="Biology" ${q.subject === 'Biology' ? 'selected' : ''}>Biology</option>
                <option value="Physics" ${q.subject === 'Physics' ? 'selected' : ''}>Physics</option>
                <option value="Chemistry" ${q.subject === 'Chemistry' ? 'selected' : ''}>Chemistry</option>
              </select>
            </div>
            <div class="q-edit-field">
              <label>Chapter</label>
              <select data-field="chapter">${chapterOptionsHtml(chapters, q.chapter)}</select>
            </div>
          </div>
          <label class="q-edit-active-check"><input type="checkbox" data-field="is_active" ${q.is_active ? 'checked' : ''}/> Active</label>
          <div class="q-admin-bar">
            <span class="q-admin-id">${escapeHtml(q.id)}</span>
            <button type="button" class="q-edit-btn" onclick="cancelEdit('${q.id}')">Cancel</button>
            <button type="button" class="q-save-btn" onclick="saveEdit('${q.id}', this)">Save</button>
          </div>
        </div>`;
    }

    function rerenderCurrentView() {
      if (duplicatesMode) {
        renderDuplicatePairs(document.getElementById('filterSubject').value);
      } else {
        renderResults();
      }
    }

    async function startEdit(id) {
      const q = currentRows.find(r => r.id === id) || duplicateRowsMap[id];
      if (!q) return;
      editingIds.add(id);
      editDrafts[id] = {
        diagram_url: q.diagram_url,
        option_a_diagram_url: q.option_a_diagram_url,
        option_b_diagram_url: q.option_b_diagram_url,
        option_c_diagram_url: q.option_c_diagram_url,
        option_d_diagram_url: q.option_d_diagram_url
      };
      await getChaptersForSubject(q.subject);
      rerenderCurrentView();
    }

    function cancelEdit(id) {
      editingIds.delete(id);
      delete editDrafts[id];
      rerenderCurrentView();
    }

    async function saveEdit(id, btnEl) {
      const card = btnEl.closest('.question-card');
      const getVal = (name) => card.querySelector(`[data-field="${name}"]`).value;
      const draft = editDrafts[id] || {};
      const payload = Object.assign({
        subject: getVal('subject'),
        question: getVal('question').trim(),
        option_a: getVal('option_a').trim(),
        option_b: getVal('option_b').trim(),
        option_c: getVal('option_c').trim(),
        option_d: getVal('option_d').trim(),
        correct_answer: getVal('correct_answer'),
        chapter: getVal('chapter').trim() || null,
        year: getVal('year') ? parseInt(getVal('year'), 10) : null,
        source_tag: getVal('source_tag').trim() || null,
        is_active: card.querySelector('[data-field="is_active"]').checked
      }, draft);
      const originalLabel = btnEl.textContent;
      btnEl.disabled = true;
      btnEl.textContent = 'Saving...';
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 20000);
      try {
        const res = await fetch(`${API_BASE}/admin/pyq-update/${id}`, {
          method: 'PATCH',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify(payload),
          signal: controller.signal
        });
        if (res.status === 401) return logout();
        if (!res.ok) { alert('Save failed: ' + await describeHttpError(res)); btnEl.disabled = false; btnEl.textContent = originalLabel; return; }
        const data = await res.json();
        if (data.error) { alert('Save failed: ' + data.error); btnEl.disabled = false; btnEl.textContent = originalLabel; return; }
        const updated = data.updated;
        const idx = currentRows.findIndex(r => r.id === id);
        if (idx !== -1) currentRows[idx] = Object.assign({}, currentRows[idx], updated);
        if (duplicateRowsMap[id]) duplicateRowsMap[id] = Object.assign({}, duplicateRowsMap[id], updated);
        editingIds.delete(id);
        delete editDrafts[id];
        rerenderCurrentView();
      } catch (e) {
        alert(e.name === 'AbortError' ? 'Timed out waiting for the server -- check your connection and try again.' : 'Could not reach server.');
        btnEl.disabled = false;
        btnEl.textContent = originalLabel;
      } finally {
        clearTimeout(timeoutId);
      }
    }

    function computeFlags(q) {
      const flags = [];
      if (!q.correct_answer || !['a', 'b', 'c', 'd'].includes(q.correct_answer.toLowerCase().trim())) {
        flags.push('No valid correct answer set');
      }
      if (!q.chapter || !q.chapter.trim()) {
        flags.push('No chapter tagged');
      }
      const hasAnyUploadedDiagram = !!(q.diagram_url || q.option_a_diagram_url || q.option_b_diagram_url || q.option_c_diagram_url || q.option_d_diagram_url);
      if (q.has_diagram && !hasAnyUploadedDiagram) {
        flags.push('Diagram expected but none uploaded');
      }
      return flags;
    }

    function questionCardHtml(q) {
      if (editingIds.has(q.id)) return editFormHtml(q);
      const correctLetter = (q.correct_answer || '').toLowerCase().trim();
      const opts = ['a', 'b', 'c', 'd'].map(opt => {
        if (!q['option_' + opt]) return '';
        const isCorrect = opt === correctLetter;
        const optImg = q['option_' + opt + '_diagram_url'] ? `<img class="q-diagram-img" src="${escapeHtml(q['option_' + opt + '_diagram_url'])}">` : '';
        return `<div class="q-option${isCorrect ? ' correct' : ''}"><strong>${opt.toUpperCase()})</strong> <span>${parseWithMath(q['option_' + opt])}${optImg}</span></div>`;
      }).join('');
      const flags = computeFlags(q);
      return `
        <div class="question-card">
          <div class="q-meta">
            <span class="q-year">${q.year || ''}</span>
            <span>${escapeHtml(q.subject || '')}</span>
            ${q.chapter ? `<span>${escapeHtml(q.chapter)}</span>` : ''}
            ${q.source_tag ? `<span>${escapeHtml(q.source_tag)}</span>` : ''}
            ${!q.is_active ? '<span class="q-inactive-flag">Inactive</span>' : ''}
          </div>
          <div class="q-text">${parseWithMath(q.question)}</div>
          ${q.diagram_url ? `<img class="q-diagram-img" src="${escapeHtml(q.diagram_url)}">` : ''}
          <div class="q-options">${opts}</div>
          <div class="q-admin-bar">
            <span class="q-admin-id">${escapeHtml(q.id)}</span>
            ${flags.map(f => `<span class="q-flag">${escapeHtml(f)}</span>`).join('')}
            <button class="q-edit-btn" onclick="startEdit('${q.id}')">✏️ Edit</button>
            <button class="q-delete-btn" onclick="deleteQuestion('${q.id}', this)">🗑 Delete</button>
          </div>
        </div>`;
    }

    function renderResults() {
      const area = document.getElementById('resultsArea');
      if (currentRows.length === 0) {
        area.innerHTML = '<div class="empty-text">No rows match these filters.</div>';
        return;
      }
      area.innerHTML = currentRows.map(questionCardHtml).join('');
      area.querySelectorAll('.q-edit-field textarea').forEach(autoResizeTextarea);
    }

    async function toggleDuplicatesView() {
      duplicatesMode = !duplicatesMode;
      document.getElementById('dupToggleBtn').classList.toggle('active', duplicatesMode);
      document.getElementById('filterChapter').disabled = duplicatesMode;
      document.getElementById('filterSearch').disabled = duplicatesMode;
      document.getElementById('filterDiagram').disabled = duplicatesMode;
      document.getElementById('paginationBar').style.display = duplicatesMode ? 'none' : 'flex';
      document.getElementById('resultNote').textContent = duplicatesMode
        ? 'Comparing question + option text, ignoring common exam phrasing (\"which of the following\", \"given below\", etc). Review each pair before deleting -- a high match score is a strong hint, not a guarantee.'
        : '';
      if (duplicatesMode) {
        await loadDuplicates();
      } else {
        loadResults();
      }
    }

    async function loadDuplicates() {
      const area = document.getElementById('resultsArea');
      area.innerHTML = '<div class="loading-text">Scanning the whole active question bank for duplicates... this takes several seconds.</div>';
      document.getElementById('resultCount').textContent = '';
      try {
        const res = await fetch(`${API_BASE}/admin/pyq-duplicates?threshold=0.5`, { headers: authHeaders() });
        if (res.status === 401) return logout();
        if (!res.ok) {
          area.innerHTML = `<div class="empty-text">Error: ${escapeHtml(await describeHttpError(res))}</div>`;
          return;
        }
        const data = await res.json();
        if (data.error) {
          area.innerHTML = `<div class="empty-text">Error: ${escapeHtml(data.error)}</div>`;
          return;
        }
        duplicatePairs = data.pairs || [];
        duplicateRowsMap = data.rows || {};
        renderDuplicatePairs(document.getElementById('filterSubject').value);
      } catch (e) {
        area.innerHTML = '<div class="empty-text">Could not reach server.</div>';
      }
    }

    function renderDuplicatePairs(subjectFilter) {
      const area = document.getElementById('resultsArea');
      let pairs = duplicatePairs;
      if (subjectFilter) {
        pairs = pairs.filter(p => {
          const a = duplicateRowsMap[p.a], b = duplicateRowsMap[p.b];
          return a && b && a.subject === subjectFilter && b.subject === subjectFilter;
        });
      }
      document.getElementById('resultCount').textContent = `${pairs.length} duplicate pair${pairs.length === 1 ? '' : 's'} found (50%+ match)`;
      if (pairs.length === 0) {
        area.innerHTML = '<div class="empty-text">No duplicate pairs found.</div>';
        return;
      }
      area.innerHTML = pairs.map(p => {
        const a = duplicateRowsMap[p.a], b = duplicateRowsMap[p.b];
        if (!a || !b) return '';
        const pct = Math.round(p.overlap * 100);
        const badgeClass = p.exact ? 'exact' : (p.overlap >= 0.75 ? 'high' : 'moderate');
        const label = p.exact ? `${pct}% match — likely exact duplicate` : `${pct}% match`;
        return `
          <div class="dup-pair">
            <div class="dup-pair-header">
              <span class="dup-badge ${badgeClass}">${label}</span>
              <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <button type="button" class="dup-dismiss-btn" onclick="dismissDuplicate('${p.a}', '${p.b}', this)">Not a duplicate — don't show again</button>
                <button type="button" class="dup-delete-both-btn" onclick="deleteBothInPair('${p.a}', '${p.b}', this)">🗑 Delete both</button>
              </div>
            </div>
            <div class="dup-columns">
              ${questionCardHtml(a)}
              ${questionCardHtml(b)}
            </div>
          </div>`;
      }).join('');
      area.querySelectorAll('.q-edit-field textarea').forEach(autoResizeTextarea);
    }

    async function dismissDuplicate(idA, idB, btnEl) {
      const originalLabel = btnEl ? btnEl.textContent : null;
      if (btnEl) { btnEl.disabled = true; btnEl.textContent = 'Saving...'; }
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 20000);
      try {
        const res = await fetch(`${API_BASE}/admin/pyq-dismiss-duplicate`, {
          method: 'POST',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ id_a: idA, id_b: idB }),
          signal: controller.signal
        });
        if (res.status === 401) return logout();
        if (!res.ok) { alert('Could not dismiss: ' + await describeHttpError(res)); if (btnEl) { btnEl.disabled = false; btnEl.textContent = originalLabel; } return; }
        const data = await res.json();
        if (data.error) { alert('Could not dismiss: ' + data.error); if (btnEl) { btnEl.disabled = false; btnEl.textContent = originalLabel; } return; }
        duplicatePairs = duplicatePairs.filter(p => !((p.a === idA && p.b === idB) || (p.a === idB && p.b === idA)));
        renderDuplicatePairs(document.getElementById('filterSubject').value);
      } catch (e) {
        alert(e.name === 'AbortError' ? 'Timed out waiting for the server -- check your connection and try again.' : 'Could not reach server.');
        if (btnEl) { btnEl.disabled = false; btnEl.textContent = originalLabel; }
      } finally {
        clearTimeout(timeoutId);
      }
    }

    // Shared by deleteQuestion and deleteBothInPair -- no confirm() dialog and no state
    // mutation of its own, since the two callers need different confirm wording and different
    // post-delete bookkeeping (single row vs a pair, normal view vs duplicates view).
    // A hard timeout is included because plain fetch() never times out on its own -- a stalled
    // connection (cold Railway instance, dropped mobile network, etc.) used to leave the button
    // waiting forever with no error and no success, which looked like "nothing happened."
    async function deleteOneQuietly(id) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 20000);
      try {
        const res = await fetch(`${API_BASE}/admin/pyq-delete/${id}`, { method: 'DELETE', headers: authHeaders(), signal: controller.signal });
        if (res.status === 401) return { error: 'unauthorized' };
        if (!res.ok) return { error: await describeHttpError(res) };
        const data = await res.json();
        return data.error ? { error: data.error } : { success: true };
      } catch (e) {
        if (e.name === 'AbortError') return { error: 'Timed out waiting for the server -- check your connection and try again.' };
        return { error: 'Could not reach server.' };
      } finally {
        clearTimeout(timeoutId);
      }
    }

    async function deleteBothInPair(idA, idB, btnEl) {
      if (!confirm('Permanently delete BOTH of these questions from Supabase? This cannot be undone from here.')) return;
      const originalLabel = btnEl ? btnEl.textContent : null;
      if (btnEl) { btnEl.disabled = true; btnEl.textContent = 'Deleting...'; }
      const [resultA, resultB] = await Promise.all([deleteOneQuietly(idA), deleteOneQuietly(idB)]);
      if (resultA.error === 'unauthorized' || resultB.error === 'unauthorized') return logout();
      if (!resultA.error) {
        delete duplicateRowsMap[idA];
        duplicatePairs = duplicatePairs.filter(p => p.a !== idA && p.b !== idA);
      }
      if (!resultB.error) {
        delete duplicateRowsMap[idB];
        duplicatePairs = duplicatePairs.filter(p => p.a !== idB && p.b !== idB);
      }
      if (resultA.error || resultB.error) {
        alert('One or both deletes failed: ' + [resultA.error, resultB.error].filter(Boolean).join(' / '));
        if (btnEl) { btnEl.disabled = false; btnEl.textContent = originalLabel; }
      }
      renderDuplicatePairs(document.getElementById('filterSubject').value);
    }

    async function deleteQuestion(id, btnEl) {
      if (!confirm('Permanently delete this question from Supabase? This cannot be undone from here.')) return;
      const originalLabel = btnEl ? btnEl.textContent : null;
      if (btnEl) { btnEl.disabled = true; btnEl.textContent = 'Deleting...'; }
      const result = await deleteOneQuietly(id);
      if (result.error === 'unauthorized') return logout();
      if (result.error) {
        alert('Delete failed: ' + result.error);
        if (btnEl) { btnEl.disabled = false; btnEl.textContent = originalLabel; }
        return;
      }
      if (duplicatesMode) {
        delete duplicateRowsMap[id];
        duplicatePairs = duplicatePairs.filter(p => p.a !== id && p.b !== id);
        renderDuplicatePairs(document.getElementById('filterSubject').value);
      } else {
        currentRows = currentRows.filter(r => r.id !== id);
        totalRows = Math.max(0, totalRows - 1);
        renderResults();
        renderPagination();
        document.getElementById('resultCount').textContent = `${totalRows} matching row${totalRows === 1 ? '' : 's'}`;
      }
    }

    function renderPagination() {
      const totalPages = Math.max(1, Math.ceil(totalRows / 50));
      document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
      document.getElementById('prevPageBtn').disabled = currentPage <= 1;
      document.getElementById('nextPageBtn').disabled = currentPage >= totalPages;
    }

    function changePage(delta) {
      const totalPages = Math.max(1, Math.ceil(totalRows / 50));
      const next = currentPage + delta;
      if (next < 1 || next > totalPages) return;
      currentPage = next;
      loadResults();
    }

    if (adminKey) {
      enterDashboard();
    }
  </script>
</body>
</html>
